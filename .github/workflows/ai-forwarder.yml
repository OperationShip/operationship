name: Forward Command to Central AI

on:
  issue_comment:
    types: [created]

jobs:
  forward-signal:
    if: startsWith(github.event.comment.body, '@gemini-cli')
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Event to Central Control Room
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.CENTRAL_AI_TOKEN }}
          repository: ${{ github.repository_owner }}/operationship-central-ai
          event-type: coordinate-architecture
          client-payload: |
            {
              "repository_name": "${{ github.repository }}",
              "issue_number": "${{ github.event.issue.number }}",
              "command_prompt": "${{ github.event.comment.body }}"
            }
